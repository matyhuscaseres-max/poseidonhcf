<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Términos y condiciones | Poseidon HCF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="legal-page-shell">
      <section class="glass legal-page">
        <p class="eyebrow">Legal</p>
        <h1>Términos y condiciones</h1>
        <p id="legal-copy">Cargando contenido...</p>
        <a class="pill accent" href="/">Volver a la tienda</a>
      </section>
    </main>
    <script>
      fetch('/api/store').then(r => r.json()).then(data => {
        const p = document.getElementById('legal-copy');
        p.textContent = data?.content?.terms || 'Sin contenido configurado.';
      }).catch(() => {
        document.getElementById('legal-copy').textContent = 'No se pudo cargar el contenido.';
      });
    </script>
  </body>
</html>
